# Bank of Israel key interest rate history, seeded into the interest_rates
# table on first run (series: boi_rate). Each entry is a step point: the
# rate holds from `date` until the next entry. Prime is derived at read
# time as BoI + 1.5 and never stored.
#
# 2000-2019 points are year-end approximations (secondary sources, ±0.25pp)
# used as coarse anchors for loans originated in that era. 2020 onward is
# decision-level and high-confidence. A live refresh (POST /api/rates/refresh)
# appends newer decisions on top; seeded points are never overwritten by it.
boi_rate:
  - { date: "2000-01-01", value: 8.2 }
  - { date: "2001-12-31", value: 5.6 }
  - { date: "2002-12-31", value: 9.1 }
  - { date: "2003-12-31", value: 5.25 }
  - { date: "2004-12-31", value: 3.7 }
  - { date: "2005-12-31", value: 4.5 }
  - { date: "2007-12-31", value: 4.0 }
  - { date: "2008-12-31", value: 2.5 }
  - { date: "2009-04-01", value: 0.5 }
