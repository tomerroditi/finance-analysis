name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    name: Backend (pytest)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry and dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Run backend tests
        run: poetry run pytest

  frontend:
    runs-on: ubuntu-latest
    name: Frontend (lint + typecheck + build)
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check + build
        run: npm run build

      - name: Unit tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    name: E2E (Playwright)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry and backend deps
        run: |
          pip install poetry
          poetry install --no-root

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend + run Playwright
        working-directory: frontend
        env:
          CI: "true"
          PYTHON_KEYRING_BACKEND: keyrings.alt.file.PlaintextKeyring
        run: |
          # OS keyring isn't available on GitHub runners — the env above
          # routes keyring access to a plaintext file backend.
          poetry --directory=.. run uvicorn backend.main:app --port 8000 \
            > /tmp/backend.log 2>&1 &
          npm run dev > /tmp/frontend.log 2>&1 &
          npx -y wait-on http://localhost:8000/openapi.json http://localhost:5173 \
            -t 60000
          npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  api-fuzz:
    runs-on: ubuntu-latest
    name: API fuzz (Schemathesis)
    timeout-minutes: 15
    # Schemathesis surfaces existing 5xx bugs in the OpenAPI surface. We
    # run it on every PR to catch regressions, but do NOT block merges
    # while the historical findings are being triaged. Promote to
    # required once the baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry and backend deps
        run: |
          pip install poetry
          poetry install --no-root

      - name: Start backend
        env:
          PYTHON_KEYRING_BACKEND: keyrings.alt.file.PlaintextKeyring
        run: |
          poetry run uvicorn backend.main:app --port 8000 \
            > /tmp/backend.log 2>&1 &
          npx -y wait-on http://localhost:8000/openapi.json -t 60000

      - name: Run Schemathesis
        env:
          SCHEMATHESIS_MAX_EXAMPLES: "25"
        run: bash scripts/run_schemathesis.sh
