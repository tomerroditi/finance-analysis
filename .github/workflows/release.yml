name: Release

on:
  push:
    branches:
      - main

jobs:
  get-version:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    name: Get current version
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pyproject.toml
        id: get-version
        run: |
          pip install toml
          version=$(python -c "import toml; print(toml.load('pyproject.toml')['tool']['poetry']['version'])")
          echo "version=$version" >> $GITHUB_OUTPUT

  bump-version:
    runs-on: ubuntu-latest
    needs: get-version
    name: Bump version and create changelog
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: "${{ secrets.PERSONAL_ACCESS_TOKEN }}"
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - id: bump
        name: Run Commitizen bump
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  # Build the self-contained Windows installer and attach it to the
  # GitHub Release tagged by the bump-version step above.
  #
  # **macOS is NOT built here.** On macOS Tahoe (26.x) Apple removed
  # every easy bypass for unsigned apps: the "is damaged" / "cannot
  # verify" dialog has no Open button anymore (only Done), the
  # right-click → Open shortcut shows the same dead-end dialog, and
  # the same restriction applies to .pkg installers and .command
  # scripts. The only paths that work are (a) Apple Developer ID +
  # notarization or (b) a Terminal one-liner. Neither belongs in a
  # CI artifact, so the macOS download flow is gone. macOS users
  # build from source (see README → "Build from source (macOS)").
  build-and-release:
    needs: [get-version, bump-version]
    if: needs.bump-version.outputs.version != needs.get-version.outputs.version
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Poetry + project deps + build group
        # ``--with build`` pulls the optional [build] group (PyInstaller).
        # Playwright is in main deps; ``poetry install`` picks it up.
        # ``--no-root`` avoids treating finance-analysis as a poetry-installable.
        shell: bash
        run: |
          pip install poetry
          poetry install --no-root --with build

      - name: Install NSIS
        # Chocolatey deploys NSIS to ``C:\Program Files (x86)\NSIS``
        # but doesn't make the running shell pick it up. Explicitly
        # appending to GITHUB_PATH so subsequent steps find ``makensis``.
        shell: bash
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" >> "$GITHUB_PATH"

      - name: Run end-to-end build
        # build_app.py builds the frontend, runs PyInstaller, then
        # wraps the output with makensis. Final artifact:
        # build/FinanceAppInstaller.exe.
        shell: bash
        run: poetry run python build/build_app.py

      - name: Smoke-test the bundle
        # Boots the bundle, hits /api/version against itself, exits 0
        # only if the round-trip succeeds. Catches PyInstaller spec
        # regressions (missing hidden imports, missing data files).
        shell: bash
        run: "dist/FinanceAnalysis/FinanceAnalysis.exe --smoke-test"

      - name: Verify artifact exists
        shell: bash
        run: |
          if ! ls "build/FinanceAppInstaller.exe" >/dev/null 2>&1; then
            echo "Expected artifact at build/FinanceAppInstaller.exe not found"
            ls -la build/ || true
            exit 1
          fi

      - name: Upload artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}
          name: Release v${{ needs.bump-version.outputs.version }}
          files: build/FinanceAppInstaller.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
